<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP 请求测试工具</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        function handleContentTypeSelected() {

            const dataFormat = document.getElementById("data-format").value;

            if (dataFormat === "form-data")
                document.getElementById("tag").value = "POST 数据（form 格式）："
            else if (dataFormat === "json") {
                document.getElementById("tag").value = "POST 数据（JSON 格式）："
            }
        }
    </script>
</head>
<body>
<div class="container">
    <h1>HTTP 请求测试工具</h1>
    <form id="request-form">
        <label for="method">方法：</label>
        <select id="method" name="method">
            <option value="get">GET</option>
            <option value="post">POST</option>
        </select>
        <br>
        <label for="url">URL：</label>
        <input type="url" id="url" name="url" placeholder="http://example.com" required>
        <br>
        <label for="data-format">数据格式：</label>
        <select id="data-format" name="data-format" onclick="handleContentTypeSelected()">
            <option value="json">JSON</option>
            <option value="form-data">表单数据 (x-www-form-urlencoded)</option>
        </select>
        <br>
        <label id="tag" for="data">POST 数据（JSON 格式）：</label>
        <textarea id="data" name="data" rows="5" cols="50" placeholder='{"key": "value"}'></textarea>
        <br>
        <button type="submit">发送请求</button>
    </form><br/>
    <pre id="response"></pre>
    <form method="post" action="http://localhost:9000/setCookie">
        <input type="text" name="email"/>
        <button type="submit">提交</button>
    </form>
    <form method="post" action="http://localhost:8079/setCookie">
        <input type="text" name="gender"/>
        <button type="submit">提交</button>
    </form>
    <h2>响应结果</h2>
</div>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="script.js"></script>
</body>
</html>
